<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Registry — Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-container">
    <div class="login-box">

      <div class="login-header">
        <div class="brand">Laptop Registry</div>
        <h1>Sign in</h1>
        <p>Enter your credentials to continue.</p>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="text" id="email" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
      <p style="
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 20px;
  letter-spacing: 0.3px;
">
  No account? Please contact your system administrator.
</p>

    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Signing in...</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="java.js"></script>

  <script>
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) { window.location.href = 'home.html'; }
    });

    function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';
      if (!email || !password) {
        errorMsg.textContent = 'Please enter email and password.';
        return;
      }
      setLoading(true);
      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(function() { window.location.href = 'home.html'; })
        .catch(function() {
          setLoading(false);
          errorMsg.textContent = 'Incorrect email or password.';
        });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
  <div class="footer-credit">
  Developed by fw_techsupport
</div>
</body>
</html>
